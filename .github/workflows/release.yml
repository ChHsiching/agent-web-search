name: release

# Builds a PyInstaller single-file executable per target platform on a version
# tag and publishes it as a GitHub Release asset — as a BARE binary (no archive),
# so users download one file and run it directly. PyInstaller does NOT
# cross-compile, so each platform needs its own runner.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs for testing

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: agent-web-search-windows-x64.exe
            bin_name: agent-web-search.exe
          - os: ubuntu-latest
            asset_name: agent-web-search-linux-x64
            bin_name: agent-web-search
          - os: macos-latest
            asset_name: agent-web-search-macos
            bin_name: agent-web-search

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller agent-web-search.spec --noconfirm

      - name: Rename binary to platform asset name
        # Publish the bare binary (no archive) so users download one file and
        # run it directly. The PyInstaller output is dist/<bin_name>; rename it
        # to the platform-specific asset name at the repo root for upload.
        shell: bash
        run: |
          mv "dist/${{ matrix.bin_name }}" "${{ matrix.asset_name }}"
          ls -la "${{ matrix.asset_name }}"

      - name: Smoke test the built binary
        # Cross-platform: uses a script file rather than a shell heredoc,
        # which PowerShell on Windows runners doesn't support.
        env:
          SMOKE_BIN: ${{ matrix.asset_name }}
        run: python scripts/smoke_test.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          # Short retention: artifacts are only needed to pass the binary to
          # the release job, which re-uploads to the GitHub Release. Keep 1 day
          # for debugging, then auto-expire to avoid filling storage quota.
          retention-days: 1
          overwrite: true

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
