name: release

# Builds a PyInstaller single-file executable per target platform on a version
# tag and publishes it as a GitHub Release asset. PyInstaller does NOT
# cross-compile, so each platform needs its own runner. The binary is the
# primary install path — users download one file and run it, no Python install.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs for testing

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_suffix: windows-x64
            asset_ext: zip
          - os: ubuntu-latest
            asset_suffix: linux-x64
            asset_ext: tar.gz
          - os: macos-latest
            asset_suffix: macos
            asset_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller agent-web-search.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          7z a "../agent-web-search-${{ matrix.asset_suffix }}.zip" agent-web-search.exe

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf "../agent-web-search-${{ matrix.asset_suffix }}.tar.gz" agent-web-search

      - name: Smoke test the built binary
        # Cross-platform: uses a script file rather than a shell heredoc,
        # which PowerShell (Windows runners) does not support.
        run: python scripts/smoke_test.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-web-search-${{ matrix.asset_suffix }}
          path: agent-web-search-${{ matrix.asset_suffix }}.${{ matrix.asset_ext }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
